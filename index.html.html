<!DOCTYPE html>
<html>
<head>
    <title>Dharsic ❤️ Jerlin Jency</title>
    <style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") no-repeat center center fixed;
    background-size: cover;
    overflow-x: hidden;
    color: white;
    position: relative;
}

/* Dark romantic overlay */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: -1;
}

/* Glow Title */
h1 {
    margin-top: 40px;
    font-size: 42px;
    text-shadow: 0 0 10px pink, 0 0 20px red;
}

/* Glass Effect Slideshow */
.slideshow {
    width: 320px;
    height: 420px;
    margin: 30px auto;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 30px rgba(255, 0, 100, 0.6);
}

.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    display: none;
}

/* Buttons Romantic Glow */
button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 15px;
    transition: 0.3s;
}

#yesBtn {
    background: linear-gradient(45deg, #ff004c, #ff66a3);
    color: white;
    box-shadow: 0 0 15px #ff004c;
}

#yesBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #ff0066;
}

#noBtn {
    background: white;
    color: #ff004c;
    position: absolute;
}

#message {
    display: none;
    font-size: 28px;
    margin-top: 20px;
    text-shadow: 0 0 10px #ff66a3;
}

/* Floating Hearts Animation */
.heart {
    position: fixed;
    font-size: 20px;
    color: #ff4d88;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity:1; }




        h1 {
            margin-top: 40px;
            font-size: 38px;
        }

        h2 {
            font-weight: normal;
        }

        .slideshow {
            width: 300px;
            height: 400px;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

       .slideshow img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none; }
       


        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 15px;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #ff004c;
            color: white;
        }

        #noBtn {
            background-color: white;
            color: #ff004c;
            position: absolute;
        }

        #message {
            display: none;
            font-size: 26px;
            margin-top: 20px;
        }

        .heart {
            position: fixed;
            color: red;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }
    </style>
</head>

<body>

    <h1>Dharsic 💖 Jerlin Jency</h1>
    <h2>Our Love Story Forever 💍</h2>

<div class="slideshow">
    <img src="./photo1.jpg" class="slide active">
    <img src="./photo2.jpg" class="slide">
    <img src="./photo3.jpg" class="slide">
    <img src="./photo4.jpg" class="slide">
</div>


    <h2>Will You Be My Forever Valentine? 💕</h2>

    <button id="yesBtn" onclick="showLove()">Yes My Love ❤️</button>
    <button id="noBtn" onmouseover="moveButton()">No 🙈</button>

    <div id="message">
       
        Happy Valentine's Day 💌
    </div>

    <!-- Background Music (Replace with your song link if needed) -->
    <audio autoplay loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
    </audio>

<script>
    // Slideshow
    let index = 0;
    const slides = document.querySelectorAll(".slide");

    function showSlides() {
        slides.forEach(slide => slide.style.display = "none");
        index++;
        if (index > slides.length) { index = 1; }
        slides[index - 1].style.display = "block";
        setTimeout(showSlides, 2000);
    }
    showSlides();

    function showLove() {
        document.getElementById("message").style.display = "block";
    }

    function moveButton() {
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 50);
        let noBtn = document.getElementById("noBtn");
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    // Floating hearts
    setInterval(function() {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
</script>

</body>
</html>
